<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  height: 100%;
  overflow: hidden;
}

main { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
main h1 { color: white; margin-bottom: 20px; }
main p { color: white; line-height: 1.6; }
.game-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
#gameCanvas {
  background: #1a1a2e;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}
.game-info { display: flex; align-items: center; gap: 15px; color: white; font-size: clamp(16px, 4vw, 18px); flex-wrap: wrap; justify-content: center; }
#startBtn {
  padding: 10px 20px;
  font-size: clamp(14px, 3vw, 16px);
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.3s;
}
#startBtn:hover { background: #45a049; }
.usage-panel {
  background: rgba(255, 255, 255, 0.1);
  padding: 12px 16px;
  border-radius: 8px;
  width: 100%;
  color: white;
  font-size: clamp(12px, 3vw, 14px);
  line-height: 1.5;
}
.usage-panel h3 {
  margin-bottom: 8px;
  font-size: clamp(14px, 3.5vw, 16px);
  color: #66BB6A;
}
</style>
<script src="https://zihaohong.github.io/data/lib/navbar/navbar.js"></script>
</head>
<body>
<main>
  <h1>Snake Game</h1>
  <div class="game-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="game-info">
      <p>Score: <span id="score">0</span></p>
      <button id="startBtn">Start Game</button>
    </div>
    <div class="usage-panel" id="usagePanel">
      <h3>How to Play</h3>
      <p id="usageText">Loading...</p>
    </div>
  </div>
</main>
<script>
// Snake Game Logic
const SnakeGame = {
  canvas: null,
  ctx: null,
  gridSize: 20,
  snake: [],
  food: {},
  direction: 'right',
  nextDirection: 'right',
  score: 0,
  gameLoop: null,
  isRunning: false,

  init: function() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.reset();
    this.bindEvents();
    this.draw();
  },

  reset: function() {
    this.snake = [
      {x: 10, y: 10},
      {x: 9, y: 10},
      {x: 8, y: 10}
    ];
    this.direction = 'right';
    this.nextDirection = 'right';
    this.score = 0;
    this.spawnFood();
    document.getElementById('score').textContent = this.score;
  },

  spawnFood: function() {
    const maxX = Math.floor(this.canvas.width / this.gridSize);
    const maxY = Math.floor(this.canvas.height / this.gridSize);
    this.food = {
      x: Math.floor(Math.random() * maxX),
      y: Math.floor(Math.random() * maxY)
    };
  },

  bindEvents: function() {
    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (['arrowup', 'w'].includes(key) && this.direction !== 'down') {
        this.nextDirection = 'up';
      } else if (['arrowdown', 's'].includes(key) && this.direction !== 'up') {
        this.nextDirection = 'down';
      } else if (['arrowleft', 'a'].includes(key) && this.direction !== 'right') {
        this.nextDirection = 'left';
      } else if (['arrowright', 'd'].includes(key) && this.direction !== 'left') {
        this.nextDirection = 'right';
      }
    });
    document.getElementById('startBtn').addEventListener('click', () => {
      if (!this.isRunning) { this.start(); }
    });

    // Touch/swipe controls for mobile
    let touchStartX = 0;
    let touchStartY = 0;
    const minSwipeDistance = 30;

    this.canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });

    this.canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });

    this.canvas.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const deltaX = touchEndX - touchStartX;
      const deltaY = touchEndY - touchStartY;

      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        if (Math.abs(deltaX) > minSwipeDistance) {
          if (deltaX > 0 && this.direction !== 'left') {
            this.nextDirection = 'right';
          } else if (deltaX < 0 && this.direction !== 'right') {
            this.nextDirection = 'left';
          }
        }
      } else {
        if (Math.abs(deltaY) > minSwipeDistance) {
          if (deltaY > 0 && this.direction !== 'up') {
            this.nextDirection = 'down';
          } else if (deltaY < 0 && this.direction !== 'down') {
            this.nextDirection = 'up';
          }
        }
      }
      e.preventDefault();
    }, { passive: false });
  },

  start: function() {
    this.reset();
    this.isRunning = true;
    document.getElementById('startBtn').textContent = 'Playing...';
    document.getElementById('startBtn').disabled = true;
    this.gameLoop = setInterval(() => this.update(), 100);
  },

  update: function() {
    this.direction = this.nextDirection;
    const head = {...this.snake[0]};
    switch (this.direction) {
      case 'up': head.y--; break;
      case 'down': head.y++; break;
      case 'left': head.x--; break;
      case 'right': head.x++; break;
    }
    const maxX = Math.floor(this.canvas.width / this.gridSize);
    const maxY = Math.floor(this.canvas.height / this.gridSize);
    if (head.x < 0 || head.x >= maxX || head.y < 0 || head.y >= maxY ||
        this.snake.some(segment => segment.x === head.x && segment.y === head.y)) {
      this.gameOver();
      return;
    }
    this.snake.unshift(head);
    if (head.x === this.food.x && head.y === this.food.y) {
      this.score += 10;
      document.getElementById('score').textContent = this.score;
      this.spawnFood();
    } else {
      this.snake.pop();
    }
    this.draw();
  },

  draw: function() {
    this.ctx.fillStyle = '#1a1a2e';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.fillStyle = '#4CAF50';
    this.snake.forEach((segment, index) => {
      this.ctx.fillStyle = index === 0 ? '#66BB6A' : '#4CAF50';
      this.ctx.fillRect(
        segment.x * this.gridSize + 1,
        segment.y * this.gridSize + 1,
        this.gridSize - 2,
        this.gridSize - 2
      );
    });
    this.ctx.fillStyle = '#FF5722';
    this.ctx.fillRect(
      this.food.x * this.gridSize + 1,
      this.food.y * this.gridSize + 1,
      this.gridSize - 2,
      this.gridSize - 2
    );
  },

  gameOver: function() {
    this.isRunning = false;
    clearInterval(this.gameLoop);
    document.getElementById('startBtn').textContent = 'Start Game';
    document.getElementById('startBtn').disabled = false;
    alert(`Game Over! Score: ${this.score}`);
  }
};

document.addEventListener('DOMContentLoaded', () => {
  Navbar.init();
  SnakeGame.init();
});
</script>
</body>
</html>
